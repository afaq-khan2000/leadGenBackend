<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Email</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f4f4f4;">
    <table align="center" width="100%" border="0" cellpadding="0" cellspacing="0" style="max-width: 600px; background-color: #ffffff; margin: 20px auto; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);">
        <tr>
            <td align="center" style="padding: 20px 0; background-color: #0073e6; border-top-left-radius: 8px; border-top-right-radius: 8px;">
                <h1 style="color: #ffffff; font-size: 24px; margin: 0;">Verify Your Email</h1>
            </td>
        </tr>
        <tr>
            <td style="padding: 20px; color: #333333; line-height: 1.6;">
                <p style="font-size: 18px; margin: 0;">Hello, <strong>{{username}}</strong></p>
                <p style="font-size: 16px; margin: 10px 0;">Thank you for signing up! To complete your registration, please verify your email address by clicking the button below:</p>
                <p align="center">
                    <a href="{{url}}" style="display: inline-block; padding: 12px 24px; font-size: 16px; color: #ffffff; background-color: #0073e6; border-radius: 5px; text-decoration: none; margin-top: 10px;">Verify Email</a>
                </p>
                <p style="font-size: 16px; margin: 20px 0 0;">If you didn't request this, please ignore this email.</p>
            </td>
        </tr>
        <tr>
            <td align="center" style="padding: 20px; background-color: #f4f4f4; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; color: #666666;">
                <p style="font-size: 14px; margin: 0;">Need help? <a href="mailto:support@example.com" style="color: #0073e6; text-decoration: none;">Contact Support</a></p>
                <p style="font-size: 12px; margin-top: 10px;">&copy; 2024 LeadPro. All rights reserved.</p>
            </td>
        </tr>
    </table>
</body>
</html>
